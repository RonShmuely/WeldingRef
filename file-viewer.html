<!DOCTYPE html>
<html lang="en" data-theme="light" data-font="serif">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Markdown · Read Mode</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Lora:ital,wght@0,400;0,500;0,600;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  :root {
    /* Anthropic brand palette */
    --paper: #faf9f5;
    --paper-2: #f5f4ee;
    --paper-3: #e8e6dc;
    --ink: #141413;
    --ink-2: #2b2a26;
    --mid: #b0aea5;
    --accent: #d97757;    /* orange */
    --accent-2: #6a9bcc;  /* blue */
    --accent-3: #788c5d;  /* green */

    --bg: var(--paper);
    --bg-alt: #fdfcf8;
    --bg-elev: #ffffff;
    --fg: var(--ink);
    --fg-muted: #6d6b62;
    --fg-soft: #9c998f;
    --border: #e8e6dc;
    --border-soft: #f0eee7;
    --accent-soft: rgba(217,119,87,0.10);
    --accent-glow: rgba(217,119,87,0.35);
    --code-bg: #f5f4ee;
    --hover: #f0eee7;
    --shadow-sm: 0 1px 2px rgba(20,20,19,0.04), 0 1px 3px rgba(20,20,19,0.06);
    --shadow-md: 0 4px 14px rgba(20,20,19,0.06), 0 2px 4px rgba(20,20,19,0.04);
    --shadow-lg: 0 24px 48px rgba(20,20,19,0.12), 0 8px 20px rgba(20,20,19,0.08);
    --font-ui: "Poppins", -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    --font-body: "Lora", "Iowan Old Style", Georgia, serif;
    --font-sans: "Poppins", -apple-system, "Segoe UI", system-ui, sans-serif;
    --font-mono: "JetBrains Mono", "SF Mono", Monaco, Consolas, monospace;
    --size: 17px;
    --radius: 12px;
    --radius-lg: 20px;
    --ease: cubic-bezier(0.22, 1, 0.36, 1);
  }
  [data-theme="dark"] {
    --bg: #1a1817;
    --bg-alt: #211e1c;
    --bg-elev: #26231f;
    --fg: #faf9f5;
    --fg-muted: #a8a49a;
    --fg-soft: #6f6b60;
    --border: #332f2a;
    --border-soft: #28241f;
    --accent: #e89573;
    --accent-soft: rgba(232,149,115,0.14);
    --accent-glow: rgba(232,149,115,0.4);
    --code-bg: #211e1c;
    --hover: #2a2723;
    --shadow-sm: 0 1px 2px rgba(0,0,0,0.3), 0 1px 3px rgba(0,0,0,0.4);
    --shadow-md: 0 4px 14px rgba(0,0,0,0.35), 0 2px 4px rgba(0,0,0,0.25);
    --shadow-lg: 0 24px 48px rgba(0,0,0,0.5), 0 8px 20px rgba(0,0,0,0.3);
  }
  [data-font="sans"] .md { font-family: var(--font-sans); }
  [data-font="serif"] .md { font-family: var(--font-body); }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    font-family: var(--font-ui);
    background: var(--bg);
    color: var(--fg);
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
    transition: background 0.5s var(--ease), color 0.5s var(--ease);
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }
  /* subtle paper grain for light mode */
  body::before {
    content: "";
    position: fixed; inset: 0;
    pointer-events: none;
    opacity: 0.35;
    background-image: radial-gradient(rgba(20,20,19,0.02) 1px, transparent 1px);
    background-size: 3px 3px;
    mix-blend-mode: multiply;
    z-index: 1;
  }
  [data-theme="dark"] body::before { display: none; }

  /* ——— Progress ——— */
  .progress {
    position: fixed; top: 0; left: 0;
    height: 2px; width: 0%;
    background: var(--accent);
    z-index: 200;
    transition: width 0.1s linear;
    box-shadow: 0 0 10px var(--accent-glow);
  }

  /* ——— Topbar ——— */
  .topbar {
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    gap: 10px;
    padding: 12px 20px;
    border-bottom: 1px solid var(--border);
    background: color-mix(in srgb, var(--bg) 80%, transparent);
    backdrop-filter: saturate(160%) blur(16px);
    -webkit-backdrop-filter: saturate(160%) blur(16px);
    flex-shrink: 0;
    z-index: 50;
    position: relative;
  }
  .topbar > * { flex-shrink: 0; }
  .logo {
    display: flex; align-items: center; gap: 10px;
    font-weight: 600; font-size: 14px;
    letter-spacing: -0.2px;
    font-family: var(--font-ui);
  }
  .logo-dot {
    width: 24px; height: 24px;
    border-radius: 8px;
    background: var(--ink);
    display: grid; place-items: center;
    color: var(--paper);
    font-size: 11px; font-weight: 700;
    transition: background 0.3s var(--ease);
  }
  [data-theme="dark"] .logo-dot { background: var(--accent); color: var(--ink); }
  .logo-dot::after {
    content: "✦";
    font-size: 12px;
    line-height: 1;
  }
  .stats {
    display: flex; gap: 14px;
    margin-left: 12px;
    font-size: 12px;
    color: var(--fg-muted);
    opacity: 0;
    transform: translateY(-2px);
    transition: opacity 0.35s var(--ease), transform 0.35s var(--ease);
  }
  .stats.show { opacity: 1; transform: none; }
  .stats span b { color: var(--fg); font-weight: 600; margin-right: 4px; font-family: var(--font-ui); }
  .spacer { flex: 1; }

  .ctrl-group {
    display: flex; align-items: center; gap: 2px;
    background: var(--bg-elev);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 3px;
    box-shadow: var(--shadow-sm);
  }
  .icon-btn {
    background: transparent;
    border: none;
    padding: 6px 9px;
    border-radius: 7px;
    cursor: pointer;
    color: var(--fg-muted);
    font-size: 13px;
    font-family: inherit;
    font-weight: 500;
    display: inline-flex;
    align-items: center; justify-content: center;
    transition: background 0.2s var(--ease), color 0.2s var(--ease), transform 0.15s var(--ease);
    min-width: 30px; height: 28px;
    position: relative;
  }
  .icon-btn:hover { background: var(--hover); color: var(--fg); }
  .icon-btn:active { transform: scale(0.92); }
  .icon-btn.active { background: var(--accent-soft); color: var(--accent); }
  .icon-btn svg { width: 16px; height: 16px; }

  .btn {
    background: var(--bg-elev);
    color: var(--fg);
    border: 1px solid var(--border);
    padding: 8px 14px;
    border-radius: 10px;
    font-size: 13px; font-weight: 500;
    cursor: pointer;
    font-family: inherit;
    display: inline-flex; align-items: center; gap: 6px;
    transition: all 0.2s var(--ease);
    box-shadow: var(--shadow-sm);
  }
  .btn:hover { background: var(--hover); transform: translateY(-1px); box-shadow: var(--shadow-md); }
  .btn:active { transform: translateY(0); }
  .btn.primary {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
    box-shadow: 0 2px 8px var(--accent-glow);
  }
  .btn.primary:hover { filter: brightness(1.05); box-shadow: 0 6px 18px var(--accent-glow); }

  /* Theme sun/moon */
  .theme-toggle { position: relative; width: 34px; height: 28px; overflow: hidden; }
  .theme-toggle svg {
    position: absolute; top: 50%; left: 50%;
    transition: transform 0.5s var(--ease), opacity 0.3s var(--ease);
  }
  .theme-toggle .sun { transform: translate(-50%,-50%) rotate(0deg); opacity: 1; }
  .theme-toggle .moon { transform: translate(-50%,-180%) rotate(-90deg); opacity: 0; }
  [data-theme="dark"] .theme-toggle .sun { transform: translate(-50%,120%) rotate(90deg); opacity: 0; }
  [data-theme="dark"] .theme-toggle .moon { transform: translate(-50%,-50%) rotate(0deg); opacity: 1; }

  /* ——— Main ——— */
  .main { display: flex; flex: 1; overflow: hidden; position: relative; }

  /* ——— Sidebar ——— */
  .sidebar {
    width: 272px;
    border-right: 1px solid var(--border);
    background: var(--bg-alt);
    overflow-y: auto;
    flex-shrink: 0;
    display: flex; flex-direction: column;
    transition: transform 0.4s var(--ease), width 0.4s var(--ease), opacity 0.3s var(--ease);
  }
  body.focus-mode .sidebar { width: 0; opacity: 0; border-right: none; overflow: hidden; }
  body.focus-mode .toc { display: none !important; }
  body.focus-mode .content-wrap.has-toc { padding-right: 0; }

  .sidebar-head {
    padding: 16px 16px 10px;
    font-size: 11px; font-weight: 600;
    color: var(--fg-soft);
    text-transform: uppercase;
    letter-spacing: 1.3px;
    display: flex; justify-content: space-between; align-items: center;
    font-family: var(--font-ui);
  }
  .count-badge {
    background: var(--accent-soft);
    color: var(--accent);
    padding: 2px 8px;
    border-radius: 10px;
    font-size: 11px; font-weight: 600;
    letter-spacing: 0;
  }

  .search-wrap { padding: 0 12px 10px; }
  .search {
    width: 100%;
    background: var(--bg-elev);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 8px 14px 8px 36px;
    font-size: 13px;
    font-family: var(--font-ui);
    color: var(--fg);
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='14' height='14' viewBox='0 0 24 24' fill='none' stroke='%239c998f' stroke-width='2.2' stroke-linecap='round'><circle cx='11' cy='11' r='7'/><path d='M21 21l-4.3-4.3'/></svg>");
    background-repeat: no-repeat;
    background-position: 12px center;
  }
  .search:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
  .search::placeholder { color: var(--fg-soft); }

  .file-list { list-style: none; padding: 4px 8px 20px; margin: 0; }
  .file-list li {
    padding: 10px 10px 10px 12px;
    font-size: 13.5px;
    cursor: pointer;
    border-radius: 10px;
    color: var(--fg);
    display: flex;
    align-items: center;
    gap: 8px;
    transition: background 0.18s var(--ease);
    opacity: 0;
    transform: translateX(-6px);
    animation: slideIn 0.4s var(--ease) forwards;
    font-family: var(--font-ui);
    position: relative;
  }
  @keyframes slideIn { to { opacity: 1; transform: none; } }
  .file-list li.hidden { display: none; }
  .file-list li:hover { background: var(--hover); }
  .file-list li.active {
    background: var(--accent-soft);
    color: var(--accent);
    font-weight: 500;
  }
  .file-list li.active::before {
    content: "";
    position: absolute;
    left: 0;
    top: 50%;
    transform: translateY(-50%);
    width: 3px;
    height: 18px;
    background: var(--accent);
    border-radius: 0 2px 2px 0;
  }
  .file-list li .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--fg-soft);
    flex-shrink: 0;
    transition: background 0.2s;
  }
  .file-list li.active .dot { background: var(--accent); box-shadow: 0 0 8px var(--accent-glow); animation: pulse 2s infinite; }
  @keyframes pulse {
    0%,100% { box-shadow: 0 0 0 0 var(--accent-glow); }
    50% { box-shadow: 0 0 0 5px rgba(217,119,87,0); }
  }
  .file-list li .name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .file-list li .pin, .file-list li .close {
    width: 22px; height: 22px;
    border-radius: 6px;
    display: grid; place-items: center;
    opacity: 0;
    color: var(--fg-muted);
    transition: opacity 0.15s, background 0.15s, color 0.15s, transform 0.2s;
    flex-shrink: 0;
    background: transparent;
    border: none;
    cursor: pointer;
    padding: 0;
  }
  .file-list li:hover .pin, .file-list li:hover .close { opacity: 0.6; }
  .file-list li .pin:hover, .file-list li .close:hover { opacity: 1; background: var(--hover); color: var(--fg); transform: scale(1.1); }
  .file-list li.pinned .pin { opacity: 1; color: var(--accent); }
  .file-list li.pinned .pin:hover { color: var(--accent); }
  .file-list li.just-added { animation: sparkleIn 0.8s var(--ease); }
  @keyframes sparkleIn {
    0% { background: var(--accent-soft); transform: translateX(-6px) scale(0.98); }
    50% { background: var(--accent-soft); transform: translateX(0) scale(1.02); }
    100% { background: transparent; transform: none; }
  }

  .empty-hint {
    padding: 24px 18px;
    font-size: 12.5px;
    color: var(--fg-muted);
    line-height: 1.6;
    text-align: center;
  }
  .empty-hint kbd {
    display: inline-block;
    padding: 1px 7px;
    background: var(--code-bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--fg);
  }

  /* ——— Content ——— */
  .content-wrap {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    scroll-behavior: smooth;
    position: relative;
  }
  .content-wrap.drag-over { background: var(--accent-soft); }
  @media (min-width: 1251px) {
    .content-wrap.has-toc { padding-right: 260px; }
  }
  .content {
    padding: 64px 72px 120px;
    max-width: 820px;
    margin: 0 auto;
    animation: fadeInUp 0.5s var(--ease);
  }
  @keyframes fadeInUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }

  .placeholder {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    height: calc(100vh - 150px);
    color: var(--fg-muted);
    text-align: center;
    gap: 18px;
    animation: fadeIn 0.6s var(--ease);
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .placeholder .art {
    width: 96px; height: 96px;
    border-radius: 28px;
    background: var(--bg-elev);
    display: grid; place-items: center;
    border: 1px solid var(--border);
    box-shadow: var(--shadow-md);
    position: relative;
    overflow: hidden;
  }
  .placeholder .art::before {
    content: "";
    position: absolute;
    top: -30%; left: -30%;
    width: 60%; height: 60%;
    background: radial-gradient(circle, var(--accent-soft), transparent 70%);
    animation: float 8s ease-in-out infinite;
  }
  @keyframes float {
    0%,100% { transform: translate(0,0); }
    33% { transform: translate(40px, 30px); }
    66% { transform: translate(-20px, 50px); }
  }
  .placeholder .art svg { position: relative; color: var(--accent); }
  .placeholder h2 {
    margin: 0; font-size: 22px; font-weight: 600;
    color: var(--fg);
    letter-spacing: -0.3px;
    font-family: var(--font-ui);
  }
  .placeholder p { margin: 0; font-size: 14px; max-width: 380px; line-height: 1.6; font-family: var(--font-ui); }
  .placeholder .kbd-hints {
    display: flex; gap: 12px; margin-top: 10px;
    font-size: 11px;
    flex-wrap: wrap; justify-content: center;
  }
  .placeholder .kbd-hints span { display: flex; align-items: center; gap: 5px; font-family: var(--font-ui); }
  .placeholder kbd {
    padding: 2px 7px;
    background: var(--bg-elev);
    border: 1px solid var(--border);
    border-radius: 5px;
    font-family: var(--font-mono);
    font-size: 11px;
    box-shadow: 0 1px 0 var(--border);
  }

  /* ——— Markdown article ——— */
  .md {
    line-height: 1.75;
    font-size: var(--size);
    color: var(--fg);
    letter-spacing: -0.003em;
    overflow-wrap: break-word;
    word-wrap: break-word;
  }
  .md[dir="rtl"] { text-align: right; }
  .md > * { animation: reveal 0.5s var(--ease) both; }
  @keyframes reveal { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
  .md h1, .md h2, .md h3, .md h4, .md h5, .md h6 {
    margin: 2em 0 0.6em;
    line-height: 1.25;
    font-weight: 600;
    letter-spacing: -0.02em;
    scroll-margin-top: 90px;
    position: relative;
    font-family: var(--font-ui);
    color: var(--fg);
    text-wrap: balance;
  }
  .md h1 { font-size: 2em; margin-top: 0.2em; font-weight: 700; letter-spacing: -0.03em; }
  .md h2 { font-size: 1.5em; padding-bottom: 0.3em; border-bottom: 1px solid var(--border-soft); }
  .md h3 { font-size: 1.22em; }
  .md h4 { font-size: 1.05em; color: var(--fg-muted); text-transform: none; }
  .md h1 .anchor, .md h2 .anchor, .md h3 .anchor {
    position: absolute; left: -1.1em;
    opacity: 0;
    color: var(--accent);
    text-decoration: none;
    font-weight: 400;
    transition: opacity 0.2s;
  }
  .md[dir="rtl"] h1 .anchor, .md[dir="rtl"] h2 .anchor, .md[dir="rtl"] h3 .anchor {
    left: auto; right: -1.1em;
  }
  .md h1:hover .anchor, .md h2:hover .anchor, .md h3:hover .anchor { opacity: 0.6; }
  .md .anchor:hover { opacity: 1 !important; }

  .md p { margin: 0 0 1em; }
  .md a {
    color: var(--accent);
    text-decoration: none;
    background-image: linear-gradient(var(--accent), var(--accent));
    background-size: 100% 1px;
    background-repeat: no-repeat;
    background-position: 0 100%;
    transition: background-size 0.3s var(--ease);
  }
  .md a:hover { background-size: 100% 2px; }
  .md ul, .md ol { padding-left: 1.6em; margin: 0 0 1em; }
  .md[dir="rtl"] ul, .md[dir="rtl"] ol { padding-left: 0; padding-right: 1.6em; }
  .md li { margin: 0.3em 0; }
  .md li::marker { color: var(--accent); }

  .md code {
    background: var(--code-bg);
    padding: 2px 7px;
    border-radius: 5px;
    font-family: var(--font-mono);
    font-size: 0.84em;
    border: 1px solid var(--border-soft);
    color: var(--fg);
  }
  .md pre {
    background: var(--code-bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px 20px;
    overflow-x: auto;
    margin: 0 0 1.2em;
    position: relative;
    box-shadow: var(--shadow-sm);
  }
  .md pre code {
    background: transparent; border: none;
    padding: 0;
    font-size: 0.86em;
    line-height: 1.65;
  }
  .copy-btn {
    position: absolute; top: 10px; right: 10px;
    background: var(--bg-elev);
    color: var(--fg-muted);
    border: 1px solid var(--border);
    border-radius: 7px;
    padding: 4px 9px;
    font-size: 11px;
    cursor: pointer;
    opacity: 0;
    transition: all 0.2s var(--ease);
    font-family: var(--font-mono);
  }
  .md pre:hover .copy-btn { opacity: 1; }
  .copy-btn:hover { background: var(--hover); color: var(--fg); }
  .copy-btn.copied { color: var(--accent-3); border-color: var(--accent-3); }

  .md blockquote {
    margin: 1em 0;
    padding: 14px 18px;
    border-left: 3px solid var(--accent);
    background: var(--bg-alt);
    border-radius: 0 var(--radius) var(--radius) 0;
    color: var(--fg);
    box-shadow: var(--shadow-sm);
  }
  .md[dir="rtl"] blockquote {
    border-left: none;
    border-right: 3px solid var(--accent);
    border-radius: var(--radius) 0 0 var(--radius);
  }
  .md blockquote p:last-child { margin-bottom: 0; }

  /* Callouts (GFM-style: > [!NOTE] / [!TIP] / [!WARNING] / [!IMPORTANT] / [!CAUTION]) */
  .md .callout {
    margin: 1em 0;
    padding: 14px 18px;
    border-radius: var(--radius);
    background: var(--bg-alt);
    border: 1px solid var(--border);
    border-left: 3px solid var(--accent);
    box-shadow: var(--shadow-sm);
    position: relative;
  }
  .md[dir="rtl"] .callout { border-left: 1px solid var(--border); border-right: 3px solid var(--accent); }
  .md .callout p { margin: 0.3em 0; }
  .md .callout p:first-child { margin-top: 0; }
  .md .callout p:last-child { margin-bottom: 0; }
  .md .callout-title {
    font-weight: 600;
    font-family: var(--font-ui);
    font-size: 0.92em;
    display: flex; align-items: center; gap: 8px;
    margin-bottom: 6px !important;
    letter-spacing: -0.01em;
  }
  .md .callout-title svg { width: 16px; height: 16px; flex-shrink: 0; }
  .md .callout[data-kind="note"]     { border-left-color: var(--accent-2); }
  .md .callout[data-kind="note"] .callout-title { color: var(--accent-2); }
  .md .callout[data-kind="tip"]      { border-left-color: var(--accent-3); }
  .md .callout[data-kind="tip"] .callout-title { color: var(--accent-3); }
  .md .callout[data-kind="warning"],
  .md .callout[data-kind="caution"]  { border-left-color: var(--accent); }
  .md .callout[data-kind="warning"] .callout-title,
  .md .callout[data-kind="caution"] .callout-title { color: var(--accent); }
  .md .callout[data-kind="important"] { border-left-color: var(--accent); background: var(--accent-soft); }
  .md .callout[data-kind="important"] .callout-title { color: var(--accent); }

  .md table {
    border-collapse: separate; border-spacing: 0;
    margin: 0 0 1.2em;
    width: 100%;
    font-size: 0.93em;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    box-shadow: var(--shadow-sm);
    font-family: var(--font-ui);
  }
  .md th, .md td {
    border-bottom: 1px solid var(--border-soft);
    padding: 11px 14px;
    text-align: left;
    vertical-align: top;
  }
  .md[dir="rtl"] th, .md[dir="rtl"] td { text-align: right; }
  .md tr:last-child td { border-bottom: none; }
  .md th { background: var(--bg-alt); font-weight: 600; color: var(--fg-muted); font-size: 0.86em; text-transform: uppercase; letter-spacing: 0.5px; }
  .md tbody tr { transition: background 0.15s; }
  .md tbody tr:hover { background: var(--hover); }

  .md img {
    max-width: 100%; height: auto;
    border-radius: var(--radius);
    box-shadow: var(--shadow-md);
    cursor: zoom-in;
    transition: transform 0.4s var(--ease), box-shadow 0.4s var(--ease);
  }
  .md img:hover { transform: translateY(-2px); box-shadow: var(--shadow-lg); }

  .md hr {
    border: none;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--border), transparent);
    margin: 2.5em 0;
  }

  /* ——— TOC ——— */
  .toc {
    position: fixed;
    top: 88px;
    right: 24px;
    width: 228px;
    max-height: calc(100vh - 128px);
    overflow-y: auto;
    font-size: 12.5px;
    padding: 10px 4px;
    opacity: 0;
    transform: translateX(8px);
    transition: opacity 0.4s var(--ease), transform 0.4s var(--ease);
    pointer-events: none;
    z-index: 20;
    font-family: var(--font-ui);
  }
  .toc.show { opacity: 1; transform: none; pointer-events: auto; }
  .toc-head {
    font-size: 10px; font-weight: 600;
    color: var(--fg-soft);
    text-transform: uppercase;
    letter-spacing: 1.3px;
    padding: 0 12px 12px;
    display: flex; align-items: center; gap: 6px;
  }
  .toc-head::after {
    content: "";
    flex: 1;
    height: 1px;
    background: var(--border);
  }
  .toc ul { list-style: none; padding: 0; margin: 0; border-left: 1px solid var(--border); }
  .toc li a {
    display: block;
    padding: 6px 12px;
    color: var(--fg-muted);
    text-decoration: none;
    border-left: 2px solid transparent;
    margin-left: -1px;
    transition: color 0.2s, border-color 0.2s, background 0.2s, padding-left 0.2s;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    line-height: 1.4;
  }
  .toc li a:hover { color: var(--fg); background: var(--hover); }
  .toc li a.active {
    color: var(--accent);
    border-left-color: var(--accent);
    font-weight: 500;
    padding-left: 16px;
  }
  .toc li.lvl-3 a { padding-left: 24px; font-size: 12px; }
  .toc li.lvl-3 a.active { padding-left: 28px; }
  .toc li.lvl-4 a { padding-left: 36px; font-size: 11.5px; color: var(--fg-soft); }

  /* ——— Back to top (with progress ring) ——— */
  .fab {
    position: fixed; bottom: 28px; right: 28px;
    width: 48px; height: 48px;
    border-radius: 50%;
    background: var(--bg-elev);
    border: 1px solid var(--border);
    color: var(--fg);
    cursor: pointer;
    display: grid; place-items: center;
    box-shadow: var(--shadow-md);
    opacity: 0;
    transform: translateY(12px) scale(0.9);
    transition: opacity 0.3s var(--ease), transform 0.3s var(--ease), background 0.2s, color 0.2s;
    z-index: 30;
    overflow: visible;
  }
  .fab.show { opacity: 1; transform: none; }
  .fab:hover { background: var(--accent); color: #fff; border-color: var(--accent); transform: translateY(-2px) scale(1.05); }
  .fab svg.icon { width: 18px; height: 18px; z-index: 2; }
  .fab .ring {
    position: absolute; inset: -3px;
    pointer-events: none;
  }
  .fab .ring circle {
    fill: none;
    stroke-width: 2.5;
    stroke-linecap: round;
    transform: rotate(-90deg);
    transform-origin: center;
  }
  .fab .ring .track { stroke: var(--border); }
  .fab .ring .bar {
    stroke: var(--accent);
    stroke-dasharray: 163.36;
    stroke-dashoffset: 163.36;
    transition: stroke-dashoffset 0.1s linear;
  }

  /* ——— Lightbox ——— */
  .lightbox {
    position: fixed; inset: 0;
    background: rgba(20,20,19,0.88);
    display: none;
    align-items: center; justify-content: center;
    z-index: 300;
    cursor: zoom-out;
    padding: 40px;
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
  }
  .lightbox.show { display: flex; animation: fadeIn 0.25s var(--ease); }
  .lightbox img {
    max-width: 100%; max-height: 100%;
    border-radius: 8px;
    box-shadow: 0 24px 60px rgba(0,0,0,0.6);
    animation: zoomIn 0.3s var(--ease);
  }
  @keyframes zoomIn { from { opacity: 0; transform: scale(0.92); } to { opacity: 1; transform: none; } }

  /* ——— Drop hint ——— */
  .drop-hint {
    position: fixed; inset: 12px;
    border: 2px dashed var(--accent);
    border-radius: 18px;
    background: var(--accent-soft);
    display: none;
    align-items: center; justify-content: center;
    pointer-events: none;
    z-index: 250;
    backdrop-filter: blur(6px);
  }
  .drop-hint.show { display: flex; animation: fadeIn 0.2s var(--ease); }
  .drop-hint .pill {
    background: var(--bg-elev);
    padding: 14px 26px;
    border-radius: 999px;
    font-size: 15px; font-weight: 600;
    color: var(--accent);
    border: 1px solid var(--accent);
    box-shadow: var(--shadow-lg);
    display: flex; align-items: center; gap: 10px;
    font-family: var(--font-ui);
  }

  /* Scrollbars */
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; border: 2px solid transparent; background-clip: padding-box; }
  ::-webkit-scrollbar-thumb:hover { background: var(--fg-soft); background-clip: padding-box; }

  input[type="file"] { display: none; }

  /* Responsive */
  @media (max-width: 1250px) {
    .toc { display: none; }
    .content-wrap.has-toc { padding-right: 0; }
    .content { padding: 56px 44px 100px; }
  }
  @media (max-width: 900px) {
    .stats { display: none; }
    .content { padding: 48px 28px 100px; }
    .md h1 { font-size: 1.7em; }
    .md h2 { font-size: 1.35em; }
  }
  @media (max-width: 720px) {
    .sidebar { position: absolute; left: 0; top: 0; bottom: 0; z-index: 40; box-shadow: var(--shadow-lg); }
    .content { padding: 36px 22px 80px; }
    .md h1 { font-size: 1.5em; }
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
  }
</style>
</head>
<body>
  <div class="progress" id="progress"></div>

  <header class="topbar">
    <div class="logo">
      <div class="logo-dot"></div>
      <span>Read Mode</span>
    </div>
    <div class="stats" id="stats">
      <span><b id="wordCount">0</b>words</span>
      <span><b id="readTime">0</b>min read</span>
    </div>
    <div class="spacer"></div>

    <div class="ctrl-group" title="Text size">
      <button class="icon-btn" id="sizeDown" title="Smaller"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M5 12h14"/></svg></button>
      <button class="icon-btn" id="sizeUp" title="Larger"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg></button>
    </div>

    <div class="ctrl-group" title="Typeface">
      <button class="icon-btn" id="fontSans" title="Sans" style="font-family: var(--font-sans); font-weight:700;">A</button>
      <button class="icon-btn active" id="fontSerif" title="Serif" style="font-family: var(--font-body); font-weight:700; font-style:italic;">A</button>
    </div>

    <button class="icon-btn" id="focusBtn" title="Focus mode (F)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3H5a2 2 0 0 0-2 2v3M21 8V5a2 2 0 0 0-2-2h-3M3 16v3a2 2 0 0 0 2 2h3M16 21h3a2 2 0 0 0 2-2v-3"/></svg>
    </button>

    <button class="btn primary" id="openBtn">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
      Open
    </button>

    <button class="icon-btn theme-toggle" id="themeBtn" title="Toggle theme (T)">
      <svg class="sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
      <svg class="moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
    </button>

    <input type="file" id="fileInput" accept=".md,.markdown,text/markdown" multiple />
  </header>

  <div class="main">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-head">
        <span>Library</span>
        <span class="count-badge" id="countBadge">0</span>
      </div>
      <div class="search-wrap">
        <input type="text" class="search" id="search" placeholder="Filter files…" />
      </div>
      <ul class="file-list" id="fileList"></ul>
      <div class="empty-hint" id="emptyHint">
        Drop <kbd>.md</kbd> files anywhere<br>or click <b>Open</b>
      </div>
    </aside>

    <div class="content-wrap" id="contentWrap">
      <div class="content" id="content">
        <div class="placeholder" id="placeholder">
          <div class="art">
            <svg width="42" height="42" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M14 3v4a1 1 0 0 0 1 1h4"/>
              <path d="M17 21H7a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h7l5 5v11a2 2 0 0 1-2 2z"/>
              <path d="M9 13h6M9 17h4"/>
            </svg>
          </div>
          <h2>Ready to read</h2>
          <p>Drop a Markdown file anywhere, or click Open. Everything stays on your device.</p>
          <div class="kbd-hints">
            <span><kbd>↑</kbd><kbd>↓</kbd> switch file</span>
            <span><kbd>F</kbd> focus</span>
            <span><kbd>M</kbd> mark mode</span>
            <span><kbd>T</kbd> theme</span>
            <span><kbd>/</kbd> search</span>
          </div>
        </div>
      </div>
    </div>

    <nav class="toc" id="toc" aria-label="Table of contents">
      <div class="toc-head"><span>On this page</span></div>
      <ul id="tocList"></ul>
    </nav>
  </div>

  <button class="fab" id="fab" title="Back to top">
    <svg class="ring" viewBox="0 0 60 60">
      <circle class="track" cx="30" cy="30" r="26"/>
      <circle class="bar" cx="30" cy="30" r="26"/>
    </svg>
    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 15l-6-6-6 6"/></svg>
  </button>

  <div class="lightbox" id="lightbox"><img id="lightboxImg" alt="" /></div>

  <div class="drop-hint" id="dropHint">
    <div class="pill">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M12 3v12M7 8l5-5 5 5M5 21h14"/></svg>
      Drop Markdown files
    </div>
  </div>

<script>
  const $ = id => document.getElementById(id);
  const fileInput = $('fileInput'), openBtn = $('openBtn'), themeBtn = $('themeBtn');
  const sizeDown = $('sizeDown'), sizeUp = $('sizeUp');
  const fontSans = $('fontSans'), fontSerif = $('fontSerif');
  const focusBtn = $('focusBtn'), search = $('search');
  const fileList = $('fileList'), emptyHint = $('emptyHint'), countBadge = $('countBadge');
  const content = $('content'), contentWrap = $('contentWrap'), placeholder = $('placeholder');
  const dropHint = $('dropHint'), progress = $('progress');
  const stats = $('stats'), wordCount = $('wordCount'), readTime = $('readTime');
  const toc = $('toc'), tocList = $('tocList');
  const fab = $('fab'), fabBar = document.querySelector('.fab .bar');
  const lightbox = $('lightbox'), lightboxImg = $('lightboxImg');

  const files = [];
  let activeIndex = -1;
  let observer = null;

  const LS = { get: (k,d) => localStorage.getItem('mdv.'+k) ?? d, set: (k,v) => localStorage.setItem('mdv.'+k, v) };

  /* Theme */
  applyTheme(LS.get('theme', 'light'));
  themeBtn.addEventListener('click', () => {
    const next = document.documentElement.dataset.theme === 'dark' ? 'light' : 'dark';
    applyTheme(next); LS.set('theme', next);
  });
  function applyTheme(t) { document.documentElement.dataset.theme = t; }

  /* Font size */
  const SIZES = [14, 15, 16, 17, 18, 20, 22];
  let sizeIdx = parseInt(LS.get('sizeIdx', 3));
  applySize();
  sizeDown.addEventListener('click', () => { if (sizeIdx > 0) { sizeIdx--; applySize(); } });
  sizeUp.addEventListener('click', () => { if (sizeIdx < SIZES.length - 1) { sizeIdx++; applySize(); } });
  function applySize() {
    document.documentElement.style.setProperty('--size', SIZES[sizeIdx] + 'px');
    LS.set('sizeIdx', sizeIdx);
  }

  /* Font family */
  applyFont(LS.get('font', 'serif'));
  fontSans.addEventListener('click', () => applyFont('sans'));
  fontSerif.addEventListener('click', () => applyFont('serif'));
  function applyFont(f) {
    document.documentElement.dataset.font = f;
    fontSans.classList.toggle('active', f === 'sans');
    fontSerif.classList.toggle('active', f === 'serif');
    LS.set('font', f);
  }

  /* Focus mode */
  if (LS.get('focus', '0') === '1') { document.body.classList.add('focus-mode'); focusBtn.classList.add('active'); }
  focusBtn.addEventListener('click', () => {
    const on = document.body.classList.toggle('focus-mode');
    focusBtn.classList.toggle('active', on);
    LS.set('focus', on ? '1' : '0');
  });

  /* Open */
  openBtn.addEventListener('click', () => fileInput.click());
  fileInput.addEventListener('change', e => { handleFiles(e.target.files); fileInput.value = ''; });

  /* Drag & drop */
  let dragDepth = 0;
  window.addEventListener('dragenter', e => { e.preventDefault(); dragDepth++; dropHint.classList.add('show'); });
  window.addEventListener('dragover', e => e.preventDefault());
  window.addEventListener('dragleave', e => { e.preventDefault(); dragDepth--; if (dragDepth <= 0) { dragDepth = 0; dropHint.classList.remove('show'); } });
  window.addEventListener('drop', e => {
    e.preventDefault(); dragDepth = 0; dropHint.classList.remove('show');
    if (e.dataTransfer?.files) handleFiles(e.dataTransfer.files);
  });

  function handleFiles(fList) {
    const incoming = Array.from(fList).filter(f => /\.(md|markdown|txt)$/i.test(f.name) || f.type === 'text/markdown');
    if (!incoming.length) return;
    incoming.forEach(f => {
      const reader = new FileReader();
      reader.onload = () => {
        files.push({ name: f.name, content: reader.result, pinned: false, justAdded: true });
        renderList();
        if (activeIndex === -1) selectFile(files.length - 1);
        setTimeout(() => { files.forEach(x => x.justAdded = false); renderList(); }, 900);
      };
      reader.readAsText(f);
    });
  }

  /* Search filter */
  search.addEventListener('input', () => {
    const q = search.value.trim().toLowerCase();
    Array.from(fileList.children).forEach((li, i) => {
      const f = sortedFiles()[i];
      if (!f) return;
      li.classList.toggle('hidden', q && !f.name.toLowerCase().includes(q));
    });
  });
  function sortedFiles() {
    return [...files].sort((a,b) => (b.pinned?1:0) - (a.pinned?1:0));
  }

  /* File list */
  function renderList() {
    fileList.innerHTML = '';
    const sorted = sortedFiles();
    sorted.forEach((f, si) => {
      const origIdx = files.indexOf(f);
      const li = document.createElement('li');
      li.style.animationDelay = (si * 30) + 'ms';
      if (origIdx === activeIndex) li.classList.add('active');
      if (f.pinned) li.classList.add('pinned');
      if (f.justAdded) li.classList.add('just-added');
      li.innerHTML = `
        <span class="dot"></span>
        <span class="name"></span>
        <button class="pin" title="Pin" aria-label="Pin">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="${f.pinned ? 'currentColor' : 'none'}" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 17v5M9 10.76V6a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v4.76a2 2 0 0 0 .561 1.39L17 14H7l1.439-1.85A2 2 0 0 0 9 10.76z"/></svg>
        </button>
        <button class="close" title="Close" aria-label="Close">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M6 6l12 12M18 6l-12 12"/></svg>
        </button>`;
      li.querySelector('.name').textContent = f.name;
      li.title = f.name;
      li.querySelector('.pin').addEventListener('click', e => { e.stopPropagation(); f.pinned = !f.pinned; renderList(); });
      li.querySelector('.close').addEventListener('click', e => { e.stopPropagation(); closeFile(origIdx); });
      li.addEventListener('click', () => selectFile(origIdx));
      fileList.appendChild(li);
    });
    countBadge.textContent = files.length;
    emptyHint.style.display = files.length ? 'none' : '';
  }

  function closeFile(i) {
    files.splice(i, 1);
    if (files.length === 0) { activeIndex = -1; showPlaceholder(); }
    else {
      if (activeIndex === i) selectFile(Math.min(i, files.length - 1));
      else if (activeIndex > i) activeIndex--;
    }
    renderList();
  }

  function showPlaceholder() {
    content.innerHTML = ''; content.appendChild(placeholder);
    stats.classList.remove('show');
    toc.classList.remove('show');
    contentWrap.classList.remove('has-toc');
  }

  /* Direction */
  function detectDir(text) {
    const sample = text.slice(0, 8000);
    const heb = (sample.match(/[\u0590-\u05FF\u0600-\u06FF]/g) || []).length;
    const lat = (sample.match(/[A-Za-z]/g) || []).length;
    return heb > lat * 0.8 ? 'rtl' : 'ltr';
  }

  /* Select + render */
  function selectFile(i) {
    activeIndex = i;
    renderList();
    const f = files[i];
    content.style.opacity = '0';
    setTimeout(() => {
      let html = marked.parse(f.content, { breaks: false, gfm: true });
      html = transformCallouts(html);
      const dir = detectDir(f.content);
      content.innerHTML = `<article class="md" dir="${dir}">${html}</article>`;
      const article = content.querySelector('.md');
      article.querySelectorAll('p, h1, h2, h3, h4, h5, h6, li, td, th, blockquote').forEach(el => el.setAttribute('dir', 'auto'));
      enhanceArticle(article);
      buildTOC(article);
      computeStats(f.content);
      content.style.opacity = '1';
      contentWrap.scrollTop = 0;
    }, 180);
  }

  /* GFM-style callouts (> [!NOTE], [!TIP], [!WARNING], [!IMPORTANT], [!CAUTION]) */
  function transformCallouts(html) {
    const kinds = {
      note:      { label: 'Note',      icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/></svg>' },
      tip:       { label: 'Tip',       icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v1M4.93 4.93l.7.7M2 12h1M19.07 4.93l-.7.7M22 12h-1M7 18a5 5 0 1 1 10 0v3H7v-3z"/><path d="M10 22h4"/></svg>' },
      important: { label: 'Important', icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 9v4M12 17h.01"/><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/></svg>' },
      warning:   { label: 'Warning',   icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0zM12 9v4M12 17h.01"/></svg>' },
      caution:   { label: 'Caution',   icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M15 9l-6 6M9 9l6 6"/></svg>' }
    };
    return html.replace(/<blockquote>\s*<p>\s*\[!(NOTE|TIP|IMPORTANT|WARNING|CAUTION)\]\s*(?:<br\s*\/?>)?\s*([\s\S]*?)<\/blockquote>/gi, (m, kindRaw, body) => {
      const kind = kindRaw.toLowerCase();
      const k = kinds[kind];
      return `<div class="callout" data-kind="${kind}"><p class="callout-title">${k.icon}${k.label}</p>${body}</div>`;
    });
  }

  /* Article enhancements */
  function enhanceArticle(article) {
    const used = new Set();
    article.querySelectorAll('h1, h2, h3, h4').forEach(h => {
      const base = (h.textContent || '').trim().toLowerCase()
        .replace(/[^\w\u0590-\u05FF\u0600-\u06FF\s-]/g, '')
        .replace(/\s+/g, '-').slice(0, 60) || 'section';
      let id = base, n = 2;
      while (used.has(id)) id = `${base}-${n++}`;
      used.add(id); h.id = id;
      const a = document.createElement('a');
      a.href = '#' + id; a.className = 'anchor'; a.textContent = '#';
      a.setAttribute('aria-label', 'Link to section');
      h.prepend(a);
    });

    article.querySelectorAll('pre').forEach(pre => {
      const btn = document.createElement('button');
      btn.className = 'copy-btn'; btn.textContent = 'Copy';
      btn.addEventListener('click', () => {
        const code = pre.querySelector('code')?.innerText || pre.innerText;
        navigator.clipboard.writeText(code).then(() => {
          btn.textContent = '✓ Copied'; btn.classList.add('copied');
          setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 1500);
        });
      });
      pre.appendChild(btn);
    });

    article.querySelectorAll('img').forEach(img => {
      img.addEventListener('click', () => {
        lightboxImg.src = img.src; lightboxImg.alt = img.alt || '';
        lightbox.classList.add('show');
      });
    });

    article.querySelectorAll('table').forEach(t => {
      if (!t.parentElement.classList.contains('table-wrap')) {
        const wrap = document.createElement('div'); wrap.className = 'table-wrap';
        wrap.style.overflowX = 'auto';
        t.parentNode.insertBefore(wrap, t); wrap.appendChild(t);
      }
    });
  }

  lightbox.addEventListener('click', () => lightbox.classList.remove('show'));

  /* TOC + scrollspy */
  function buildTOC(article) {
    if (observer) { observer.disconnect(); observer = null; }
    const headings = Array.from(article.querySelectorAll('h1, h2, h3, h4'));
    if (headings.length < 3) { toc.classList.remove('show'); contentWrap.classList.remove('has-toc'); return; }
    contentWrap.classList.add('has-toc');

    tocList.innerHTML = '';
    headings.forEach(h => {
      const lvl = parseInt(h.tagName[1]);
      const li = document.createElement('li');
      li.className = 'lvl-' + lvl;
      const a = document.createElement('a');
      a.href = '#' + h.id;
      a.textContent = (h.textContent || '').replace(/^#\s*/, '').trim();
      a.dataset.target = h.id;
      a.addEventListener('click', e => { e.preventDefault(); h.scrollIntoView({ behavior: 'smooth', block: 'start' }); });
      li.appendChild(a); tocList.appendChild(li);
    });
    toc.classList.add('show');

    observer = new IntersectionObserver(entries => {
      entries.forEach(entry => {
        const id = entry.target.id;
        const link = tocList.querySelector(`a[data-target="${id}"]`);
        if (!link) return;
        if (entry.isIntersecting) {
          tocList.querySelectorAll('a.active').forEach(x => x.classList.remove('active'));
          link.classList.add('active');
        }
      });
    }, { root: contentWrap, rootMargin: '-20% 0px -70% 0px', threshold: 0 });
    headings.forEach(h => observer.observe(h));
  }

  /* Stats */
  function computeStats(text) {
    const plain = text.replace(/```[\s\S]*?```/g, '').replace(/[#>*_`\[\]()\-!]/g, ' ');
    const words = plain.trim().split(/\s+/).filter(Boolean).length;
    wordCount.textContent = words.toLocaleString();
    readTime.textContent = Math.max(1, Math.round(words / 220));
    stats.classList.add('show');
  }

  /* Scroll: progress bar + ring + fab */
  contentWrap.addEventListener('scroll', () => {
    const h = contentWrap.scrollHeight - contentWrap.clientHeight;
    const pct = h > 0 ? contentWrap.scrollTop / h : 0;
    progress.style.width = (pct * 100) + '%';
    fabBar.style.strokeDashoffset = 163.36 * (1 - pct);
    fab.classList.toggle('show', contentWrap.scrollTop > 400);
  });
  fab.addEventListener('click', () => contentWrap.scrollTo({ top: 0, behavior: 'smooth' }));

  /* Keyboard */
  document.addEventListener('keydown', e => {
    if (e.target.matches('input, textarea')) {
      if (e.key === 'Escape' && e.target === search) { search.value = ''; search.dispatchEvent(new Event('input')); search.blur(); }
      return;
    }
    if (lightbox.classList.contains('show') && e.key === 'Escape') { lightbox.classList.remove('show'); return; }
    if (e.ctrlKey || e.metaKey || e.altKey) return;

    if (e.key === '/') { e.preventDefault(); search.focus(); search.select(); }
    else if (e.key === 't' || e.key === 'T') themeBtn.click();
    else if (e.key === 's' || e.key === 'S') sizeUp.click();
    else if (e.key === 'f' || e.key === 'F') focusBtn.click();
    else if (e.key === 'm' || e.key === 'M') toggleMarkMode();
    else if (e.key === 'o' || e.key === 'O') fileInput.click();
    else if (e.key === 'ArrowDown' && files.length) { e.preventDefault(); selectFile(Math.min(files.length - 1, activeIndex + 1)); }
    else if (e.key === 'ArrowUp' && files.length) { e.preventDefault(); selectFile(Math.max(0, activeIndex - 1)); }
    else if (e.key === 'Home') contentWrap.scrollTo({ top: 0, behavior: 'smooth' });
    else if (e.key === 'End') contentWrap.scrollTo({ top: contentWrap.scrollHeight, behavior: 'smooth' });
  });

  content.style.transition = 'opacity 0.18s ease';

  /* ——— Mark Mode loader (press M) ——— */
  function toggleMarkMode() {
    if (window.__markMode) {
      document.getElementById('mm-exit')?.click();
      return;
    }
    if (window.__markModeScriptLoaded) { /* re-run IIFE via cached source */ }
    const s = document.createElement('script');
    s.src = 'mark-mode.js?t=' + Date.now();
    s.onload = () => { window.__markModeScriptLoaded = true; };
    s.onerror = () => console.warn('[mark-mode] failed to load mark-mode.js from same folder');
    document.body.appendChild(s);
  }
</script>
</body>
</html>
